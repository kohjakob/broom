name: broom
description: "Broom - Minimalism/Decluttering App"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Database
  sqflite: ^2.4.2
  path: ^1.9.1

  # Fonts
  google_fonts: ^6.2.1

  # State management
  flutter_bloc: ^9.1.1

  # Dependency injection
  get_it: ^8.0.3

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2

  # Camera & photos
  camera: ^0.11.1
  image_picker: ^1.1.2

  # HTTP
  http: ^1.3.0

  # File system
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  file_picker: ^10.1.7

  # Settings
  shared_preferences: ^2.5.3

  # Card swiping
  flutter_card_swiper: ^7.2.0
  emoji_picker_flutter: ^4.4.0
  archive: ^4.0.9
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
